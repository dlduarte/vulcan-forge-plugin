name: Release (Maven Central)

# Publica no Maven Central quando uma Release do GitHub e criada.
# Usa os mesmos secrets do supple-tools:
#   OSSRH_USERNAME / OSSRH_TOKEN  - User Token do Central Portal (central.sonatype.com)
#   GPG_PRIVATE_KEY / GPG_PASSPHRASE - chave GPG para assinar os artefatos
on:
  release:
    types: [ created ]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK 17 + Central credentials + GPG
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
          server-id: central
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}

      - name: Build and publish
        run: mvn -B --no-transfer-progress -Prelease clean deploy
        env:
          MAVEN_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.OSSRH_TOKEN }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
