name: Release (Maven Central)

# Publica no Maven Central quando uma Release do GitHub e criada.
# Secrets necessarios no repositorio (Settings -> Secrets and variables -> Actions):
#   CENTRAL_USERNAME        - token username do Central Portal
#   CENTRAL_PASSWORD        - token password do Central Portal
#   MAVEN_GPG_PRIVATE_KEY   - chave GPG privada (ASCII armored) para assinar
#   MAVEN_GPG_PASSPHRASE    - passphrase da chave GPG
on:
  release:
    types: [ published ]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17 + Central credentials + GPG
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
          server-id: central
          server-username: CENTRAL_USERNAME
          server-password: CENTRAL_PASSWORD
          gpg-private-key: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE

      - name: Publish to Maven Central
        run: mvn -B --no-transfer-progress -Prelease clean deploy
        env:
          CENTRAL_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          CENTRAL_PASSWORD: ${{ secrets.CENTRAL_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
